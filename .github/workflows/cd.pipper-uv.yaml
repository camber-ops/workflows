name: Pipper (UV) Publishing

on:
  workflow_call:
    inputs:
      devel:
        required: false
        type: boolean
        default: false
      prod:
        required: false
        type: boolean
        default: false
      python_version:
        required: false
        type: string
        default: "3.14"
      shared:
        required: false
        type: boolean
        default: false
      install_pipper:
        required: false
        type: boolean
        default: false
      include_extras:
        required: false
        type: boolean
        default: true

# https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services
permissions:
  # This is required for AWS OIDC credential access.
  id-token: write
  # This is required for actions/checkout.
  contents: read

jobs:
  pipper_publish:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@v6
      # Access to the toolbelt repo scripts
      - name: Checkout Toolbelt
        uses: actions/checkout@v6
        with:
          repository: camber-ops/toolbelt
          ref: main
          token: ${{ secrets.REPO_READ_PAT }}
          path: .toolbelt
      - name: Load Toolbelt
        uses: ./.toolbelt
      # https://github.com/actions/setup-python
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      # https://github.com/astral-sh/setup-uv
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # https://github.com/aws-actions/configure-aws-credentials
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:
            arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gh-pipper
          aws-region: us-west-2
      - name: Configure CodeArtifact
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain camber \
            --domain-owner "$AWS_ACCOUNT_ID" \
            --query authorizationToken \
            --output text)
          echo "UV_INDEX_CODE_ARTIFACT_USERNAME=aws" >> "$GITHUB_ENV"
          echo "UV_INDEX_CODE_ARTIFACT_PASSWORD=$TOKEN" >> "$GITHUB_ENV"
      - name: Install Dependencies
        run: |
          uv sync ${{ inputs.include_extras && '--all-extras' || '' }}
          uv python list
      - name: Pipper Dependencies
        if: inputs.install_pipper
        run: uv run task pipper_update_all
      - name: Pipper Bundle
        run: uv run task pipper_bundle
      - name: Pipper Publish Devel
        if: inputs.devel
        run: uv run task pipper_publish_devel
      - name: Pipper Shared Publish Devel
        if: inputs.devel && inputs.shared
        run: uv run task pipper_shared_publish_devel
      - name: Pipper Publish Prod
        if: inputs.prod
        run: uv run task pipper_publish
      - name: Pipper Shared Publish Prod
        if: inputs.prod && inputs.shared
        run: uv run task pipper_shared_publish
