name: Check Structure

on:
  workflow_call:
    inputs:
      check_version_bump:
        type: boolean
        default: true
        description: >
          Warn if pyproject.toml or package.json version is unchanged in this
          PR. Set to false for repos that do not require version bumps.

permissions:
  # Required for commit quality checks and version bump checkout.
  pull-requests: read
  contents: read

jobs:
  commit_quality_check:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/marketplace/actions/github-api-request
      - uses: octokit/request-action@v3.x
        id: get_commits
        with:
          # https://docs.github.com/en/rest/pulls/pulls#list-commits-on-a-pull-request
          route:
            GET /repos/${{ github.event.repository.full_name }}/pulls/${{
            github.event.number }}/commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Log Commits
        env:
          COMMITS_JSON: ${{ steps.get_commits.outputs.data }}
        run: |
          printf '%s\n' "$COMMITS_JSON" > ./commits.log
      - name: Check Commit Count
        run: |
          count=$(jq '. | length' ./commits.log)
          if [ "$count" -lt 1 ] || [ "$count" -gt 8 ]; then
            echo "ERROR: PR must have between 1 and 5 commits, found ${count}."
            exit 1
          fi
      - name: Check No Merge Commits
        run: |
          merge_count=$(jq '[.[] | select(.parents | length > 1)] | length' ./commits.log)
          if [ "$merge_count" -gt 0 ]; then
            echo "ERROR: PR contains ${merge_count} merge commit(s)."
            echo "History must be linear (rebase only)."
            exit 1
          fi
      - name: Check Commit Message Format
        run: |
          jq -e '
            all(
              .[].commit.message;
              . as $msg |
              ($msg | split("\n\n")) as $parts |
              ($parts | length >= 2) and
              ($parts[0] | length >= 6) and
              ($parts[1] | length >= 10)
            )
          ' ./commits.log || {
            echo "ERROR: One or more commits have an invalid message format."
            echo "Each commit must have a subject (6+ chars) and a body (10+ chars)"
            echo "separated by a blank line."
            echo ""
            echo "Expected format:"
            echo "  Commit Subject"
            echo ""
            echo "  Commit message description..."
            exit 1
          }

  version_bump_check:
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request' && inputs.check_version_bump
    steps:
      - uses: actions/checkout@v6
      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}
      - name: Check Version Bump
        run: |
          FAILED=0

          if [ -f pyproject.toml ]; then
            head_ver=$(grep -m1 '^version = ' pyproject.toml | grep -o '"[^"]*"' | tr -d '"')
            base_ver=$(git show origin/${{ github.base_ref }}:pyproject.toml 2>/dev/null \
              | grep -m1 '^version = ' | grep -o '"[^"]*"' | tr -d '"')
            if [ -n "$head_ver" ] && [ -n "$base_ver" ] && [ "$head_ver" = "$base_ver" ]; then
              echo "WARNING: pyproject.toml version not bumped (${head_ver})."
              echo "Consider bumping the version for this PR."
              FAILED=1
            fi
          fi

          if [ -f package.json ]; then
            head_ver=$(jq -r '.version // empty' package.json)
            base_ver=$(git show origin/${{ github.base_ref }}:package.json 2>/dev/null \
              | jq -r '.version // empty')
            if [ -n "$head_ver" ] && [ -n "$base_ver" ] && [ "$head_ver" = "$base_ver" ]; then
              echo "WARNING: package.json version not bumped (${head_ver})."
              echo "Consider bumping the version for this PR."
              FAILED=1
            fi
          fi

          exit $FAILED
